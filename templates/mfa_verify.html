<!DOCTYPE html><html><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>MFA Verify · ASOC AI ME Dashboard</title><link rel="stylesheet" href="/static/style.css"/></head>
<body data-theme="dark"><main class="login-wrap"><section class="panel login-panel"><div class="panel-head"><div><div class="eyebrow">Vodacom ASOC · Multi-Factor Authentication</div><h1>Enter Authenticator Code</h1><p>Open Microsoft Authenticator and enter the 6-digit code for ASOC AI Dashboard.</p></div></div>{% if error %}<div class="alert">{{ error }}</div>{% endif %}<form method="post" action="/mfa/verify" class="form-grid"><div class="wide"><label>6-digit code</label><input name="code" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6" required autofocus placeholder="123456"/></div><div class="wide"><button type="submit">Verify</button></div></form><p class="help"><a href="/logout">Cancel and return to login</a></p></section></main></body></html>
